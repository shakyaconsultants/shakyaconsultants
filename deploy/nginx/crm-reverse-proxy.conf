server {
    listen 443 ssl http2;
    server_name shakyaconsultants.com www.shakyaconsultants.com;

    # ...your existing SSL cert directives...

    location = /crm {
        return 307 /crm/login;
    }

    location /crm/ {
        proxy_http_version 1.1;
        proxy_set_header Host crm-eight-lac.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /crm;

        # Websocket compatibility
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Strip /crm prefix before sending upstream
        rewrite ^/crm/(.*)$ /$1 break;
        proxy_pass https://crm-eight-lac.vercel.app;

        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }
}
