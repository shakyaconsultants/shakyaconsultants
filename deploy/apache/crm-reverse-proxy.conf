# Requires:
#   a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl

RewriteEngine On

# /crm -> /crm/login
RewriteRule ^/crm$ /crm/login [R=307,L]

# Reverse proxy under /crm
ProxyPreserveHost Off
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Prefix "/crm"

ProxyPass        /crm/ https://crm-eight-lac.vercel.app/
ProxyPassReverse /crm/ https://crm-eight-lac.vercel.app/

# Websocket support
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule ^/crm/(.*)  wss://crm-eight-lac.vercel.app/$1 [P,L]

Header always set X-Robots-Tag "noindex, nofollow, noarchive" "expr=%{REQUEST_URI} =~ m#^/crm/#"
